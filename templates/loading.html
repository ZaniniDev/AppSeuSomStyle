<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeuSomStyle — Carregando suas músicas...</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --green: #1DB954;
      --green-dark: #158a3e;
      --green-glow: rgba(29, 185, 84, 0.15);
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255, 255, 255, 0.07);
      --text-muted: #888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Glow radial de fundo ── */
    .bg-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(29, 185, 84, 0.1) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }

    /* ── Logo no topo ── */
    .logo {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      opacity: 0.9;
    }

    .logo .dot { color: var(--green); }

    /* ── Equalizador ── */
    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 64px;
      margin-bottom: 40px;
    }

    .eq-bar {
      width: 8px;
      border-radius: 4px 4px 0 0;
      background: var(--green);
      box-shadow: 0 0 12px rgba(29, 185, 84, 0.6);
      animation: eq-bounce 1.2s ease-in-out infinite;
    }

    .eq-bar:nth-child(1) { animation-delay: 0s;    animation-duration: 1.1s; }
    .eq-bar:nth-child(2) { animation-delay: 0.15s; animation-duration: 0.9s; }
    .eq-bar:nth-child(3) { animation-delay: 0.3s;  animation-duration: 1.3s; }
    .eq-bar:nth-child(4) { animation-delay: 0.1s;  animation-duration: 1.0s; }
    .eq-bar:nth-child(5) { animation-delay: 0.25s; animation-duration: 0.85s; }
    .eq-bar:nth-child(6) { animation-delay: 0.4s;  animation-duration: 1.2s; }
    .eq-bar:nth-child(7) { animation-delay: 0.05s; animation-duration: 0.95s; }

    @keyframes eq-bounce {
      0%, 100% { height: 12px; }
      50%       { height: 56px; }
    }

    /* ── Conteúdo central ── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .title span { color: var(--green); }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 48px;
      max-width: 380px;
      line-height: 1.6;
    }

    /* ── Barra de progresso indeterminada ── */
    .progress-track {
      width: 320px;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 2px;
      animation: shimmer 1.6s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }

    /* ── Mensagem rotativa ── */
    .loading-msg {
      font-size: 0.82rem;
      color: #555;
      min-height: 1.2em;
      transition: opacity 0.4s;
    }

    /* ── Dots de status ── */
    .dots {
      display: inline-flex;
      gap: 4px;
      margin-left: 4px;
    }

    .dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #555;
      animation: dot-fade 1.4s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-fade {
      0%, 80%, 100% { opacity: 0.3; }
      40%           { opacity: 1; }
    }

    /* ── Badge spotify ── */
    .badge-spotify {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-glow);
      border: 1px solid rgba(29, 185, 84, 0.3);
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <a href="/" class="logo">
    <i class="bi bi-music-note-beamed"></i>SeuSomStyle<span class="dot">.</span>
  </a>

  <div class="content">
    <div class="badge-spotify">
      <i class="bi bi-spotify"></i> Conectado ao Spotify
    </div>

    <div class="equalizer">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>

    <h1 class="title">Buscando suas <span>músicas</span></h1>
    <p class="subtitle">
      Estamos carregando toda a sua biblioteca do Spotify.<br />
      Isso pode levar alguns segundos...
    </p>

    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <div class="loading-msg" id="loading-msg">
      Conectando à biblioteca<span class="dots"><span></span><span></span><span></span></span>
    </div>
  </div>

  <script>
    const STATE = "{{ state }}";

    // Mensagens rotativas para entreter o usuário
    const msgs = [
      "Conectando à biblioteca",
      "Buscando músicas curtidas",
      "Carregando capas dos álbuns",
      "Organizando sua coleção",
      "Quase lá",
    ];

    let msgIdx = 0;
    const msgEl = document.getElementById('loading-msg');

    function rotateMsg() {
      msgIdx = (msgIdx + 1) % msgs.length;
      msgEl.style.opacity = '0';
      setTimeout(() => {
        msgEl.innerHTML = `${msgs[msgIdx]}<span class="dots"><span></span><span></span><span></span></span>`;
        msgEl.style.opacity = '1';
      }, 400);
    }

    setInterval(rotateMsg, 2800);

    // Função para buscar músicas do usuário logado
    async function fetchMusicas() {
      try {
        console.log("Iniciando busca por músicas do usuário logado...");
        const response = await fetch(`/buscar-minhas-musicas?state=${STATE}`);
        if (!response.ok) {
          throw new Error("Erro ao buscar músicas");
        }
        const data = await response.json();
        console.log("Músicas carregadas:", data);

        // Redireciona para a página de músicas após carregar
        // Fade-out da tela de carregamento antes de navegar.
        // O browser mantém a página esmaecida enquanto aguarda a resposta do servidor.
        setTimeout(() => {
          document.body.style.transition = 'opacity 0.5s ease';
          document.body.style.opacity = '0';
          setTimeout(() => {
            window.location.href = `/minhas-musicas?state=${STATE}`;
          }, 500);
        }, 800);
      } catch (error) {
        console.error("Erro ao carregar músicas:", error);
        alert("Não foi possível carregar suas músicas. Tente novamente mais tarde.");
      }
    }

    // Inicia o processo de busca ao carregar a página
    fetchMusicas()    
  </script>

</body>
</html>
